name: Keep Supabase alive

# 목적: Supabase 무료 플랜은 약 1주 무활동 시 프로젝트를 일시정지한다(데이터는 보존).
#   이 워크플로가 매일 공개 RPC(registration_status)를 1회 호출해 DB 활동을 만들어
#   자동 정지를 예방한다. GitHub 러너는 네트워크 정책 제한이 없어 Supabase에 도달한다.
# 키: auth.js에 이미 공개된 publishable 키 — 비밀이 아니며 실제 방어는 RLS가 담당한다.
# 실패(빨간 X)하면 프로젝트 정지/설정 변경 신호 → 관리자 확인 필요(docs/관리자-런북.md).

on:
  schedule:
    - cron: "17 6 * * *"   # 매일 06:17 UTC (= KST 15:17). :00/:30 회피.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keepalive-supabase
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (registration_status RPC)
        run: |
          URL="https://rspxgsytxhlsauqohdbe.supabase.co/rest/v1/rpc/registration_status"
          KEY="sb_publishable_5Nl1jCdX2nbve1rubaMilw_TyitemqA"
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $code"
          cat /tmp/resp.json 2>/dev/null || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Supabase keep-alive 실패 (HTTP $code). 프로젝트 정지 또는 설정 변경 가능 — 관리자 확인 필요(docs/관리자-런북.md)."
            exit 1
          fi
          echo "Supabase 활성 유지 OK."
