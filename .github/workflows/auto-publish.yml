name: Auto merge to main

# 작업 브랜치(claude/**)에 push되면 해당 브랜치를 main에 자동 머지한다.
# 배포는 이 워크플로 완료 후 deploy-pages.yml이 workflow_run으로 이어받아 수행한다.
# (Pages 환경은 main 브랜치에서만 배포가 허용되므로 머지/배포를 분리한다.)

on:
  push:
    branches: ["claude/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-merge-main
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge pushed branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --ff-only "origin/${GITHUB_REF_NAME}" \
            || git merge --no-edit "origin/${GITHUB_REF_NAME}"
          git push origin main
